<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
@page {
  size: A4 portrait;
  margin: 0;
}

body {
  margin: 0;
  width: 210mm;
  height: 297mm;
  position: relative;
}

img {
  position: absolute;
  top: 11mm;     /* 上1.1cm */
  left: 14mm;    /* 左1.4cm */
  width: 91mm;   /* 横9.1cm */
  height: 55mm;  /* 縦5.5cm */
  object-fit: cover; /* はみ出し防止（任意） */
}
</style>
</head>

<body>
  <img src="your_image.jpg">
</body>
</html>
